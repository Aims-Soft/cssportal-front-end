<div class="container-fluid rounded-lg p-0 overflow-hidden">
  <div class="row">
    <!-- Left Section: Login Form -->
    <div class="col-5 d-flex flex-column px-5 pt-0 mt-2"> <!-- Removed min-vh-100 and justify-content-center, added py-4 and pt-0 -->
    
      <a class="logo mb-2 mt-2 offset-5 " href="#" routerLink="''"></a>
      <h3 class="  mb-1  ms-2 text-center">Log in</h3>

      <div class="btn-group bg-light rounded w-100 mb-2" role="group" style="max-width: 320px;">

      </div>

      <label class="form-label mb-1 ">Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Enter Email"
        class="form-control form-control-lg mb-2"
      />

      <div class="mb-4 position-relative">
  <label class="form-label mb-2">Password</label>

  <input
    [type]="hidePassword ? 'password' : 'text'"
    [(ngModel)]="password"
    placeholder="Enter your Password"
    class="form-control form-control-lg pe-5"
  />

  <mat-icon
    class="position-absolute top-50 end-0 translate-middle-y me-3 mt-3 cursorPointer"
    (click)="togglePassword()"
  >
    {{ hidePassword ?  'visibility_off' : 'visibility' }}
  </mat-icon>
</div>


      <a
        routerLink="/forget-password"
        routerLinkActive="active-link"
        href="#"
        class="text-primary mb-4 text-decoration-none"
      >
        Forgot password?
      </a>

      <button
        class="btn darkBlue  btn-lg w-100 mb-1"
        (click)="onLogin()"
      >
        Login
      </button>

      <div class="d-flex align-items-center my-1">
        <hr class="flex-grow-1">
        <span class="mx-3 text-muted">OR</span>
        <hr class="flex-grow-1">
      </div>

   
      <div #googleButton class="w-auto d-flex justify-content-center round-4"></div>

    
    </div>

    <!-- Right Section: Background with Grid -->
     <div class=" col-md-7 loginbg mt-5"></div>
    
  </div>
</div>
